# Project Rules and Standards
version: '1.0'

code_organization:
  structure:
    - All HTML, CSS, and JavaScript must be in a single HTML file
    - CSS should be placed in a <style> section in the document head
    - JavaScript should be placed in a <script> section at the end of the body
    - Use semantic HTML5 elements appropriately
    - Follow component-based organization within the single file
    - Maintain single responsibility principle for functions and components
    - Use comments to clearly separate different sections of the file

code_checkers:
  requirements:
    - All code must pass through appropriate code checkers before deployment
    - Code checker configurations must be stored in the project repository
    - Failed code checks must block deployment/integration
  html_validation:
    - Use W3C HTML Validator (validator.w3.org) for HTML validation
    - Run HTML validation checks as part of pre-commit hooks
    - Zero errors and warnings required for HTML
  css_validation:
    - Use stylelint for CSS validation and formatting
    - Follow standard stylelint configuration rules
    - CSS validation should verify against W3C CSS standards
  javascript_validation:
    - Use ESLint for JavaScript syntax and style checking
    - Implement JSHint for additional JavaScript error checking
    - Use Prettier for consistent JavaScript formatting
    - No errors allowed in JavaScript code checker reports
  integration:
    - Integrate code checkers with CI/CD pipeline
    - Configure pre-commit hooks to run appropriate checkers
    - Generate validation reports for each build

html_standards:
  required_elements:
    - DOCTYPE declaration
    - meta viewport tag
    - charset specification
  accessibility:
    - Use ARIA labels where appropriate
    - Maintain proper heading hierarchy
    - Include alt text for images
    - Ensure keyboard navigation support
    - Use semantic HTML elements for their intended purpose
  validation:
    - All HTML must be valid according to W3C standards
    - Organize inline JavaScript logically
    - Organize inline styles with clear comments and structure
    - HTML validation errors must be fixed before deployment

javascript_standards:
  code_style:
    - Use consistent naming conventions (camelCase for variables and functions)
    - Group related functions into logical modules
    - Use constants for configuration values
    - Implement proper error handling
  validation:
    - Must pass ESLint checks with no errors
    - Implement client-side form validation
    - Provide clear feedback for validation errors
    - Validate all user inputs before processing